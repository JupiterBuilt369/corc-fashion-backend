<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"></head>
<body style="font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #0a0a0a; color: #ffffff; padding: 40px;">
<div style="max-width: 600px; margin: 0 auto; background: #111; border: 1px solid #222; padding: 40px;">
    <h1 style="font-size: 28px; margin-bottom: 8px; color: #c6a87c;">Reset Your Password</h1>
    <p style="color: #ccc; line-height: 1.8;">Hello <span th:text="${name}" style="color: #fff; font-weight: bold;">Member</span>,</p>
    <p style="color: #ccc; line-height: 1.8;">We received a request to reset your password. Click the button below to set a new one. This link expires in 1 hour.</p>
    <div style="text-align: center; margin: 30px 0;">
        <a th:href="${resetLink}" style="display: inline-block; background: #c6a87c; color: #000; padding: 14px 40px; text-decoration: none; font-weight: bold; text-transform: uppercase; font-size: 12px; letter-spacing: 2px;">Reset Password</a>
    </div>
    <p style="color: #666; font-size: 12px;">If you did not request this, you can safely ignore this email.</p>
    <p style="color: #888; font-size: 12px; margin-top: 40px; border-top: 1px solid #222; padding-top: 20px;">CORC &mdash; Eternal Street Elegance</p>
</div>
</body>
</html>
