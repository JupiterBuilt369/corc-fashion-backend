<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"></head>
<body style="font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #0a0a0a; color: #ffffff; padding: 40px;">
<div style="max-width: 600px; margin: 0 auto; background: #111; border: 1px solid #222; padding: 40px;">
    <h1 style="font-size: 28px; margin-bottom: 8px; color: #c6a87c;">Order Confirmed</h1>
    <p style="color: #888; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px;" th:text="${orderId}">ORD-XXXX</p>
    <p style="color: #ccc; line-height: 1.8;">Thank you, <span th:text="${name}" style="color: #fff; font-weight: bold;">Member</span>.</p>
    <p style="color: #ccc; line-height: 1.8;">Your order has been confirmed and is being prepared. You will receive tracking information once your order ships.</p>
    <div style="background: #1a1a1a; border: 1px solid #333; padding: 20px; margin: 20px 0; text-align: center;">
        <p style="color: #888; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;">Order Total</p>
        <p style="color: #c6a87c; font-size: 24px; font-weight: bold;" th:text="'$' + ${total}">$0.00</p>
    </div>
    <p style="color: #888; font-size: 12px; margin-top: 40px; border-top: 1px solid #222; padding-top: 20px;">CORC &mdash; Eternal Street Elegance</p>
</div>
</body>
</html>
